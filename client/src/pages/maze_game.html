<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>The Maze</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://code.jquery.com/jquery-1.10.2.js"></script>

        <script>
            $.get("../components/navbar.html", function(data){
            $("#navbar").replaceWith(data);
            });
        </script>
        <script>
            $.get("../components/footer.html", function(data){
            $("#footer").replaceWith(data);
            });
        </script>
    </head>

    <body class="bg-light text-center d-flex flex-column min-vh-100">
        <div id="navbar"></div>

        <div class="container mt-4">
            <h2>Complete the Maze!</h2>

            <div id="maze_card" class="card shadow p-3 bg-white rounded mt-4 mx-auto d-inline-block">

                <canvas id="maze_canvas" class="border border-dark rounded"></canvas>

            </div>

        </div>

        <script>
            const BASE_SIZE = 400;
            const maze_canvas = document.getElementById("maze_canvas");
            const maze_context = maze_canvas.getContext("2d");
            let firstplay = true;
            let inputLocked = false;

            //player dimenstions
            let player = {x: 20, y: 20, size: 15};

            //goal dimensions
            let goal = {x: 360, y: 360, size: 20};

            //maze wall definitions
            const walls = [
                // Outer border
                {x: 0, y: 0, w: 400, h: 10},
                {x: 0, y: 0, w: 10, h: 400},
                {x: 0, y: 390, w: 400, h: 10},
                {x: 390, y: 0, w: 10, h: 400},

                // Maze corridors
                {x: 0, y: 40, w: 360, h: 10},
                {x: 40, y: 40, w: 10, h: 80},
                {x: 40, y: 120, w: 240, h: 10},
                {x: 80, y: 80, w: 360, h: 10},
                {x: 320, y: 80, w: 10, h: 80},
                {x: 240, y: 160, w: 10, h: 80},
                {x: 280, y: 120, w: 10, h: 40},
                {x: 240, y: 200, w: 120, h: 10},
                {x: 280, y: 240, w: 120, h: 10},
                {x: 355, y: 120, w: 10, h: 120},
                {x: 40, y: 160, w: 200, h: 10},
                {x: 40, y: 160, w: 10, h: 200},
                {x: 80, y: 200, w: 10, h: 200},
                {x: 120, y: 160, w: 10, h: 200},
                {x: 160, y: 200, w: 10, h: 200},
                {x: 200, y: 160, w: 10, h: 200},
                {x: 240, y: 280, w: 10, h: 120},
                {x: 240, y: 280, w: 120, h: 10},
                {x: 280, y: 320, w: 120, h: 10},
                {x: 280, y: 360, w: 60, h: 10},

            ];

            // Draw everything on the canvas that the maze exists on
            function draw() {
                maze_context.clearRect(0, 0, maze_canvas.width, maze_canvas.height);

                const scale = Math.min(
                    maze_canvas.width / BASE_SIZE,
                    maze_canvas.height / BASE_SIZE
                );

                // Draw walls
                maze_context.fillStyle = "black";
                for (let wall of walls) {
                    maze_context.fillRect(
                        wall.x *scale, 
                        wall.y *scale, 
                        wall.w *scale, 
                        wall.h *scale
                    );
                }

                // Draw goal
                maze_context.fillStyle = "green";
                maze_context.fillRect(
                    goal.x *scale, 
                    goal.y *scale, 
                    goal.size *scale, 
                    goal.size *scale
                );

                // Draw player
                maze_context.fillStyle = "blue";
                maze_context.fillRect(
                    player.x *scale, 
                    player.y *scale, 
                    player.size *scale, 
                    player.size *scale
                );
            }

            //resize canvas to fit window while maintaining aspect ratio
            function resizeCanvas() {
                const padding = 20; // some padding around the maze
                const size = Math.min(
                    window.innerWidth - padding,
                    window.innerHeight - 150
                );

                maze_canvas.width = size;
                maze_canvas.height = size;
                draw(); //redraw after resize
            }

            /* Collision detection Version 1 (check if player is currently colliding, not good for movement as player can "skip" through walls if they move fast enough)
            function isColliding(rect1, rect2) {
                return (
                    rect1.x < rect2.x + rect2.w &&
                    rect1.x + rect1.size > rect2.x &&
                    rect1.y < rect2.y + rect2.h &&
                    rect1.y + rect1.size > rect2.y
                );
            }*/
            // Collision detection Version 2 (check if player would collide at new position)
            function wouldCollide(pos) {
                for (let wall of walls) {
                    if (
                        pos.x < wall.x + wall.w &&
                        pos.x + player.size > wall.x &&
                        pos.y < wall.y + wall.h &&
                        pos.y + player.size > wall.y
                    ) {
                        return true;
                    }
                }
                return false;
            }

            // Check for a win
            function checkWin() {
                if (
                    player.x < goal.x + goal.size &&
                    player.x + player.size > goal.x &&
                    player.y < goal.y + goal.size &&
                    player.y + player.size > goal.y
                ) {
                    //change this to load the next page
                    window.location.href = "landing.html";
                }
            }

            //show message to players in case of collision
            function showMessage(text, duration = 2500) {
                const msg = document.createElement("div");
                msg.innerText = text;

                msg.style.position = "fixed";
                msg.style.top = "50%";
                msg.style.left = "50%";
                msg.style.transform = "translate(-50%, -50%)";

                msg.style.background = "white";
                msg.style.color = "black";
                msg.style.padding = "20px 30px";
                msg.style.borderRadius = "10px";
                msg.style.fontSize = "18px";
                msg.style.fontWeight = "bold";
                
                msg.style.zIndex = "9999";
                msg.style.opacity = "1";
                msg.style.transition = "opacity 0.5s ease";

                document.body.appendChild(msg);

                // fade out
                setTimeout(() => {
                    msg.style.opacity = "0";
                }, duration - 500);

                // remove from DOM
                setTimeout(() => {
                    msg.remove();
                }, duration);
            }
            
            // Reset game
            function resetGame(message = "") {
                if (firstplay) {
                    inputLocked = true;
                }

                player.x = 20;
                player.y = 20;
                //document.getElementById("status").innerText = message;
                draw();

                // unlock after popup duration
                setTimeout(() => {
                    inputLocked = false;
                }, 2500); // must match popup duration
            }

            function movePlayer(event) {

                if (inputLocked) return; // block input while first popup message is showing

                //STOP page scrolling
                if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) {
                    event.preventDefault();
                }

                const speed = 7;

                let newPos = { ...player };

                switch (event.key) {
                    case "ArrowUp":
                        newPos.y += speed; // inverted
                        break;
                    case "ArrowDown":
                        newPos.y -= speed; // inverted
                        break;
                    case "ArrowLeft":
                        newPos.x += speed; // inverted
                        break;
                    case "ArrowRight":
                        newPos.x -= speed; // inverted
                        break;
                    default:
                        return;
                }

                

                if (!wouldCollide(newPos)) {
                    player = newPos;
                    checkWin();
                } else if (firstplay) {
                    resetGame();
                    showMessage("Oh yeah... The controls are inverted. Haha, lol.");
                    firstplay = false;
                } else {
                    resetGame();
                    showMessage("Oof, you hit a wall! Get gud.");
                }

                draw();
            }

            document.addEventListener("keydown", movePlayer);

            window.addEventListener("resize", resizeCanvas);
            
            //initial resize to set canvas size based on window size
            resizeCanvas();

            // Initial draw
            draw();

        </script>

        <div id="footer"></div>

    </body>

</html>
