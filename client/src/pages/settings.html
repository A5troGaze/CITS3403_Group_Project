<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <script>
        $.get("../components/navbar.html", function (data) {
            $("#navbar").replaceWith(data);
        });
    </script>
    <script>
        $.get("../components/footer.html", function (data) {
            $("#footer").replaceWith(data);
        });
    </script>
    <script>
        $.get("../components/lightdark.html", function (data) {
            $("#lightdark").replaceWith(data);
        });
    </script>
    <script>
        $.get("../components/translate.html", function (data) {
            $("#translate").replaceWith(data);
        });
    </script>
</head>
<style>
    body {
        background-color: white;
        color: black;
    }

    .dark-mode {
        background-color: black;
        color: white;
    }
</style>


<body>
    <div id="navbar"></div>
    <div id="lightdark"></div>
    <div class="container">
        <h1 class="fw-bold">Settings</h1>
        <div class="card">
            <div class="card-body">
                <div class="d-inline-flex gap-1">
                    <button class="btn btn-secondary" type="button" data-bs-toggle="collapse"
                        data-bs-target="#collapseExample" aria-expanded="false" aria-controls="collapseExample">
                        Translate (click here to see options)
                    </button>
                </div>
                <div class="collapse mt-3" id="collapseExample">
                    <div id="google_translate_element"></div>
                </div>

                <div id="translate"></div>

                <br>
                <br>
                <button id="modeBtn" type="button" class="btn btn-secondary">Switch to dark mode</button>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
