<!DOCTYPE html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pop Ups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <script src="{{ url_for('static', filename='js/pop_ups.js') }}" defer></script>
  </head>



  <body>

    {% include 'components/navbar.html' %}

    <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100 px-3">

      <div class="start-box text-center" style="max-width: 500px;">
        <h2>Do you want to go to the next level?</h2>
        <br>
        <div class="d-flex justify-content-center gap-3 flex-nowrap">
          <button class="btn btn-dark px-4 hover-btn" onclick="next('start','yes')">Yes</button>
          <button class="btn btn-light px-4 hover-btn" onclick="next('start','no')">No</button>
        </div>

      </div>

    </div>
    

    <!-- Modal -->
    <div class="modal fade" id="questionModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-dark">
          <div class="modal-header">
            <h5 class="modal-title">Question</h5>
          </div>

          <div class="modal-body">
            <p id="questionText"></p>
          </div>

          <div class="modal-footer">
            <button id="yesBtn" class="btn btn-dark hover-btn" onclick="answer('yes')">Yes</button>
            <button id="noBtn" class="btn btn-light hover-btn" onclick="answer('no')">No</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  </body>
</html>
