<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  </head>

  <body class="d-flex flex-column min-vh-100">

    {% include 'components/navbar.html' %}

    <div class="card mx-auto p-2 w-50 mt-5">
        <img src="{{ url_for('static', filename='images/' + user.profile_image) }}"class="card-img-top rounded-circle mx-auto mt-3" alt="default profile picture" style="width: 150px; height: 150px; object-fit: cover;">
        <div class="card-body">
            <h5 class="card-title">Profile Photo</h5>
            <p class="card-text">Modify your profile photo. Duh.</p>
            <form action="/upload_photo" method="POST" enctype="multipart/form-data" class="mt-3">
                <input class="form-control mb-2" type="file" name="profile_pic" accept="image/png, image/jpeg" required>
                
                <button type="submit" class="btn btn-dark w-100 hover-btn">Save New Photo</button>
            </form>
        </div>
    </div>
    <br>

    {% include 'components/footer.html' %}

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  </body>
</html>
