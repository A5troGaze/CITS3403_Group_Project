<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <script src="{{ url_for('static', filename='js/profile.js') }}" defer></script>
  </head>

  <body class="d-flex flex-column min-vh-100">

    {% include 'components/navbar.html' %}

    <div class="banner-wrapper w-100 min-vh-25 overflow-hidden">
        <img src="{{ url_for('static', filename='images/' + current_user.banner_image) }}" alt="Profile Banner" 
        class="w-100 h-100" style="object-fit: cover;">
    </div>

    <div class="card border-0 shadow" style="border-radius: 1rem;">    
    <form action="/upload_photo" method="POST" enctype="multipart/form-data">
        
        <label id="avatar-trigger" for="top-file-upload" class="position-absolute top-0 start-50 translate-middle" style="width: 150px; height: 150px; cursor: pointer; z-index: 10;">
            
            <div class="position-relative rounded-circle overflow-hidden border border-white bg-white shadow-sm w-100 h-100">
                
                <img src="{{ url_for('static', filename='images/' + current_user.profile_image) }}" alt="Profile Photo" class="w-100 h-100" style="object-fit: cover;">
                
                <div id="avatar-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center" style="background-color: rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s ease;">
                    <i class="bi bi-pencil text-white" style="font-size: 2.5rem;"></i>
                </div>
                
            </div>
            
        </label>

        <input id="top-file-upload" type="file" name="profile_pic" accept="image/png, image/jpeg" style="display: none;" required onchange="this.form.submit();">
    </form>
    <br><br>
        
 

    <div class="text-center mx-auto mt-5">
        <h1 class="fw-bold" id="profilewelcome" data-name="{{ user.name }}" data-username="{{ user.username }}">Edit your profile, {{ user.username }}</h1>    
    </div>

    <div class="card mx-auto p-2 w-50 mt-5">
        <div class="card-body">
            <h5 class="card-title">Username</h5>
            <p class="card-text">Modify your username. LITERALLY what the title says.</p>
            <p class="card-text">Oh yeah. Don't copy other people.</p>
            <form action="/update_username" method="POST" class="mt-3">
                <input class="form-control mb-2" type="text" name="username" value="{{ user.username }}" required>
                <button type="submit" class="btn btn-dark w-100 hover-btn" id="newusername">Save New Username</button>
            </form>
        </div>
        <div class="card-body">
            <h5 class="card-title">Name</h5>
            <p class="card-text">Modify your name. DUH.</p>
            <form action="/update_name" method="POST" class="mt-3">
                <input class="form-control mb-2" type="text" name="name" value="{{ user.name }}" required>
                <button type="submit" class="btn btn-dark w-100 hover-btn" id="newname">Save New Name</button>
            </form>
        </div>
    </div>

    <br>
    <br>
    {% include 'components/footer.html' %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  </body>
</html>
