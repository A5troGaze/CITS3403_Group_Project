<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>NGGYUNGLYD</title>
        <!-- bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
        <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
        <style>
            #goodbye-msg {
                display:none;
                position:fixed;
                inset:0;
                background:rgba(0,0,0,0.85);
                z-index:9999;
                align-items:center;
                justify-content:center;
            }

            .goodbye-style {
                font-size: 4rem;
                color: #ff4444;
                font-weight: 900;
                text-shadow: 0 0 20px #4b4b4b;
            }
        </style>

    </head>

    <body class="d-flex flex-column min-vh-100">

        {% include 'components/navbar.html' %}

        <main class="flex-grow-1 d-flex justify-content-center align-items-center">

            <div class="container text-center">

                <h2 class="mb-4">Our Beloved Leader:</h2>

                <!-- YT vid Embed-->
                <div class="ratio ratio-16x9 mx-auto" style="max-width: 1100px;">
                    <iframe 
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
                    title="Rick Astley - Never Gonna Give You Up (Video)" 
                    allow="autoplay; encrypted-media;"
                    allowfullscreen>
                    </iframe>
                </div>

                <!-- Rick Astley Quiz -->
                <div id="quiz" class="mt-5">
                    <div id="question-box" class="card shadow p-4 mx-auto" style="max-width: 600px;">
                        <h4 id="question-text" class="mb-4"></h4>
                        <div class="d-flex justify-content-center gap-3">
                            <button class="btn btn-dark btn-lg hover-btn" id="btn-yes">Yes</button>
                            <button class="btn btn-outline-dark btn-lg hover-btn" id="btn-no">No</button>
                        </div>
                        <p id="feedback" class"mt-3 text-danger fw-bold" style="min-height: 1.5rem;"></p>
                    </div>
                </div>

                <!-- Goodbye Message -->
                <div id="goodbye-msg">
                    <div class="text-center text-white p-5">
                        <h2 style="font-size: 2.5rem;"> He's <span class="goodbye-style">NEVER</span> gonna say <span class="goodbye-style">GOODBYE</span>!</h2>
                    </div>
                </div>

            </div>

        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        <script>
            const questions = [
                {
                    text: "Is Rick ever going to give you up?",
                    correct: "No",
                    taunt: "...Really? Think again."
                },
                {
                    text: "Is Rick ever going to let you down?",
                    correct: "No",
                    taunt: "Come on, you know this."
                },
                {
                    text: "Is Rick ever going to run around?",
                    correct: "No",
                    taunt: "Rick would never. Never."
                },
                {
                    text: "Is Rick ever going to  desert you?",
                    correct: "No",
                    taunt: "Rick loves us too much."
                },
                {
                    text: "Is Rick ever going to make you cry?",
                    correct: "No",
                    taunt: "He's Rick Astley. Show some respect."
                },
                {
                    text: "Is Rick ever going to say goodbye?",
                    correct: "No",
                    taunt: "You clearly haven't been paying attention."
                }
            ];

            let current = 0;

            const questionText = document.getElementById("question-text");
            const feedback = document.getElementById("feedback");
            const btnYes = document.getElementById("btn-yes");
            const btnNo = document.getElementById("btn-no");
            const overlay = document.getElementById("goodbye-msg");

            function loadQuestion() {
                questionText.innerText = questions[current].text;
                feedback.innerText = "";
            }

            function handleAnswer(answer) {
                const q = questions[current];

                if (answer === q.correct) {
                    feedback.style.color = "";
                    feedback.innerText = "";
                    current++;

                    if (current >= questions.length) {
                        // show goodbye popup then redirect
                        overlay.style.display = "flex";
                        setTimeout(() => {
                            window.location.href = "/"; // change to your next page
                        }, 4000);
                    } else {
                        loadQuestion();
                    }
                } else {
                    feedback.style.color = "#dc3545";
                    feedback.innerText = q.taunt;
                }
            }

            btnYes.addEventListener("click", () => handleAnswer("Yes"));
            btnNo.addEventListener("click", () => handleAnswer("No"));

            loadQuestion();
        </script>
    </body>

</html>
