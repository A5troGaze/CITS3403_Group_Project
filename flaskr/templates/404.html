<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ error_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/404.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  </head>

  <body class="d-flex flex-column min-vh-100">

    <header class="flex-shrink-0">
      {% include 'components/navbar.html' %}
    </header>
    

    <main class="flex-grow-1 d-flex align-items-center py-4">

      <div class="container">

        <div class="row align-items-center text-center text-md-start">
          
          <!--left side-->
          <div class="col-12 col-md-6 ps-md-5 mb-4 mb-md-0">
            <!--404-->
            <h1 class="fw-bold" style="font-size: 10rem;">{{ error }}</h1>
            <!--message-->
            <p class="mb-4" style="font-size: 2rem">{{ error_message }}</p>
            <!--button-->
            <a href="/" class="btn btn-dark btn-lg hover-btn" id="UsertoHome">Go to Home</a>
            <!--click the image... ;)-->
            <p class="mt-3 text-muted" style="font-size: 1.2rem;" id="miniMessage">Click the image... ;) </p>
          </div>

          <!--right side (image)-->
          <div class="col-12 col-md-6 d-flex justify-content-center align-items-center">
            {% if session.get('user_id') %}
              <!-- If user is logged in load profile image -->
              <img id="meme_image" src="{{ url_for('static', filename='images/' + current_user.profile_image) }}" alt="Profile Image">
            {% else %}
              <img id="meme_image" src="" alt="404 Meme">
            {% endif %}
          </div>

        </div>

      </div>

    </main>

    <footer class="flex-shrink-0 mt-auto">
      {% include 'components/footer.html' %}
    </footer>

    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script>
      //parse components to js file ================================
      //[IMPORTANT MESSAGE!: VS CODE LIKES TO COMPLAIN ABOUT THE JINJA SYNTAX HERE: PLEASE DO NOT TWEAK. JINJA RENDERS INSIDE OF HTML FILES!]
      
      window.appConfig = {
        error : {{ error | tojson }},
        errorMessage : {{ error_message | tojson }},
        errorTitle :  {{ error_title | tojson }},
        catMemes : {{ image_list | tojson }},
        loggedIn : {{ (session.get('user_id') is not none) | tojson }}
      };

    </script>
    <script src="{{ url_for('static', filename='js/404.js') }}"></script>
  </body>
</html>
