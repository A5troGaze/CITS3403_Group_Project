<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ error_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/404.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  </head>

  <body class="d-flex flex-column vh-100">

    {% include 'components/navbar.html' %}

    <main class="flex-grow-1 d-flex align-items-center">

      <div class="container">

        <div class="row align-items-center text-center text-md-start">
          
          <!--left side-->
          <div class="col-12 col-md-6 ps-md-5 mb-4 mb-md-0">
            <!--404-->
            <h1 class="fw-bold" style="font-size: 10rem;">{{ error }}</h1>
            <!--message-->
            <p class="mb-4" style="font-size: 2rem">{{ error_message }}</p>
            <!--button-->
            <a href="/" class="btn btn-dark btn-lg hover-btn" id="UsertoHome">Go to Home</a>
            <!--click the image... ;)-->
            <p class="mt-3 text-muted" style="font-size: 1.2rem;" id="miniMessage">Click the image... ;) </p>
          </div>

          <!--right side (image)-->
          <div class="col-12 col-md-6 d-flex justify-content-center align-items-center">
            {% if session.get('user_id') %}
              <!-- If user is logged in load profile image -->
              <img id="meme_image" src="{{ url_for('static', filename='images/' + current_user.profile_image) }}" alt="Profile Image">
            {% else %}
              <img id="meme_image" src="" alt="404 Meme">
            {% endif %}
          </div>

        </div>

      </div>

    </main>

    {% include 'components/footer.html' %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/404.js') }}"></script>
    <script>
      //show error code, error message and tab title ================================
      //[IMPORTANT MESSAGE!: VS CODE LIKES TO COMPLAIN ABOUT THE JINJA SYNTAX HERE: PLEASE DO NOT TWEAK. JINJA RENDERS INSIDE OF HTML FILES!]
      const error = {{ error | tojson }};
      const errorMessage = {{ error_message | tojson }};
      const errorTitle =  {{ error_title | tojson }} ;
      const catMemes = {{ image_list | tojson }};
      const loggedIn = {{ (session.get('user_id') is not none) | tojson }};

      document.title = errorTitle;


      // Image load =================================================================
      const memeImage = document.getElementById("meme_image");

      if (!loggedIn && memeImage && catMemes.length>0) {
        memeImage.src = catMemes[Math.floor(Math.random() * catMemes.length)];
      }
      

      //random function to pick image when image is clicked
      if (memeImage && catMemes.length > 0) {
        memeImage.addEventListener('click', () => {
          let newIndex;
          let current = memeImage.src;

          do {
            newIndex = Math.floor(Math.random() * catMemes.length);
          } while (catMemes[newIndex] === current && catMemes.length > 1); // Ensure a different image is selected if there's more than one option

          memeImage.src = catMemes[newIndex];
          
          //change little message to tell you to keep on clicking
          const miniMsg = document.getElementById('miniMessage');
          
          if (miniMsg) {
            miniMsg.innerText = "Keep clicking ;)"
          }

        });
      }
      

      //hover animation for button ================================================================
      const UsertoHome = document.getElementById('UsertoHome');

      if (UsertoHome) {

        UsertoHome.addEventListener('mouseenter', () => {
          UsertoHome.innerText = "Ha, you suck! 67!";
        });
        UsertoHome.addEventListener('mouseleave', () => {
          UsertoHome.innerText = "Go to Home";
        });
      }

    </script>
  </body>
</html>
