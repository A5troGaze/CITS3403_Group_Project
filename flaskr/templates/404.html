<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="error_title">404: Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  
  </head>


  <style>

    #meme_image {
      width: 500px;
      height: 500px;
      object-fit: cover;
      border-radius: 50%;
      cursor: pointer;
    }

    #UsertoHome {
      font-size: 2rem; 
      padding: 16px 40px; 
      border-radius: 20px;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
  </style>

  <body class="d-flex flex-column vh-100">

    {% include 'components/navbar.html' %}

    <main class="flex-grow-1 d-flex align-items-center">

      <div class="container">

        <div class="row align-items-center text-center text-md-start">
          
          <!--left side-->
          <div class="col-12 col-md-6 ps-md-5 mb-4 mb-md-0">
            <!--404-->
            <h1 id="error_code" class="fw-bold" style="font-size: 10rem;">404</h1>
            <!--message-->
            <p id="error_msg" class="mb-4" style="font-size: 2rem">Oops... Page not found!</p>
            <!--button-->
            <a href="/" class="btn btn-dark btn-lg hover-btn" id="UsertoHome">Go to Home</a>
            <!--click the image... ;)-->
            <p class="mt-3 text-muted" style="font-size: 1.2rem;" id="miniMessage">Click the image... ;) </p>
          </div>

          <!--right side (image)-->
          <div class="col-12 col-md-6 d-flex justify-content-center align-items-center">
            {% if session.get('user_id') %}
              <!-- If user is logged in load profile image -->
              <img id="meme_image" src="{{ url_for('static', filename='images/' + current_user.profile_image) }}" alt="Profile Image">
            {% else %}
              <img id="meme_image" src="" alt="404 Meme">
            {% endif %}
          </div>

        </div>

      </div>

    </main>

    {% include 'components/footer.html' %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script>


      //show error code, error message and tab title ================================
      //[IMPORTANT MESSAGE!: VS CODE LIKES TO COMPLAIN ABOUT THE JINJA SYNTAX HERE, BUT IT WORKS, PLEASE DO NOT TWEAK]
      const error = {{ error | tojson }};
      document.getElementById("error_code").innerText = error;

      const error_message = {{ error_message | tojson }};
      document.getElementById("error_msg").innerText = error_message;

      const error_title =  {{ error_title | tojson }} ;
      document.getElementById("error_title").innerText = error_title;


      // Image load =================================================================
      const memeImage = document.getElementById("meme_image");

      // Folder contents
      const cat_memes = {{ image_list | tojson }};

      //initial image for logged out users 
      //[IMPORTANT MESSAGE!: VS CODE LIKES TO COMPLAIN ABOUT THE JINJA SYNTAX HERE, BUT IT WORKS, PLEASE DO NOT TWEAK]
      {% if not session.get('user_id') %}
        if (memeImage && cat_memes.length>0) {
          memeImage.src = cat_memes[Math.floor(Math.random() * cat_memes.length)];
        }
      {% endif %}

      //random function to pick image when image is clicked
      if (memeImage) {
        memeImage.addEventListener('click', () => {
          let newIndex;
          let current = memeImage.src;

          do {
            newIndex = Math.floor(Math.random() * cat_memes.length);
          } while (cat_memes[newIndex] === current && cat_memes.length > 1); // Ensure a different image is selected if there's more than one option


          memeImage.src = cat_memes[newIndex];
          
          //change little message to tell you to keep on clicking
          const miniMsg = document.getElementById('miniMessage');
          
          if (miniMsg) {
            miniMsg.innerText = "Keep clicking ;)"
          }

        });
      }
      

      //hover animation for button ================================================================
      const UsertoHome = document.getElementById('UsertoHome');

      if (UsertoHome) {

        UsertoHome.addEventListener('mouseenter', () => {
          UsertoHome.innerText = "Ha, you suck! 67!";
        });
        UsertoHome.addEventListener('mouseleave', () => {
          UsertoHome.innerText = "Go to Home";
        });
      }
      
  </script>
  </body>
</html>
