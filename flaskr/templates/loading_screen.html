<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loading...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='loader.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>

<body>

    {% include components/navbar.html %}

    <div class="loader-container">
        <div class="loader-content">
            <img src="https://media1.tenor.com/m/HPdu1njD6yYAAAAd/cat.gif" alt="cat cute" class="p-5 w-75">

            <div class="progress w-75">
                <div id="loaderBar" class="progress-bar progress-bar-animated bg-dark" role="progressbar"
                    aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%;">Loading...</div>
            </div>
        </div>
    </div>


    <script>
        const loaderBar = document.getElementById("loaderBar");

        let progress = 0;
        let direction = 1;
        let finished = false;
        let oscillate = false;

        const messages = [
            "Loading assets...",
            "Fetching data...",
            "Still working on it...",
            "Almost there...",
            "Just a moment..."
        ];

        let msgIndex = 0;
        let clickCount = 0;


        function updateBar(value) {
            loaderBar.style.width = value + "%";
            loaderBar.setAttribute("aria-valuenow", value);
        }

        function finishLevel(message) {
            if (finished) return;
            finished = true;

            clearInterval(interval);
            clearInterval(messageInterval);
            clearTimeout(timer);

            loaderBar.textContent = message;

            const finishInterval = setInterval(() => {
                if (progress < 100) {
                    progress++;
                    updateBar(progress);
                } else {
                    clearInterval(finishInterval);
                    loaderBar.classList.remove("progress-bar-animated");
                }
            }, 20);
        }

        let pauseCount = 0;

        // oscillate between 75% and 95%
        const interval = setInterval(() => {
            if (finished) return;

            if (!oscillate) {
                progress += 1;

                if (progress >= 75) {
                    progress = 75;
                    oscillate = true;
                }
            } else {

                if (progress >= 97 && direction === 1 && pauseCount < 15) {
                    pauseCount++;
                    updateBar(progress);
                    return;
                }

                pauseCount = 0;
                progress += direction * 1;

                if (progress >= 99) {
                    progress = 99;
                    direction = -1;
                }

                if (progress <= 75) {
                    progress = 75;
                    direction = 1;
                }
            }

            updateBar(progress);
        }, 20);

        const messageInterval = setInterval(() => {
            if (finished) return;
            msgIndex = (msgIndex + 1) % messages.length;
            loaderBar.textContent = messages[msgIndex];
        }, 1500);

        const timer = setTimeout(() => {
            finishLevel("Lol you passed the level congrats!!!");
        }, 30000);

        // click to end loading
        loaderBar.addEventListener("click", function () {
            if (finished) return;
            clickCount++;

            if (clickCount >= 3) {
                finishLevel("Done! Congrats you passed the level!");
            }
        });

    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
