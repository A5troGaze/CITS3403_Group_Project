<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>

<body>
    {% include 'components/navbar.html' %}

    <div class="container-fluid min-vh-100 d-flex flex-column justify-content-center align-items-center">
        <h1 class="fw-bold">Sign In</h1>
        <br>

        <form id="signInForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
                <small class="form-text text-muted">Other people will be able to see your username.</small>
            </div>
            <br>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <br>

            <button type="submit" class="btn btn-dark w-100 hover-btn">Sign In</button>
            <p class="mt-3">Don't have an account? <a href="{{ url_for('signup_page') }}" class="hover-btn">Sign Up</a></p>
        </form>
    </div>

    {% include 'components/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const loginForm = document.querySelector('#signInForm');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); 

            const formData = {
                username: e.target.username.value,
                password: e.target.password.value
            };

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(res => {
                if (res.ok) {
                    window.location.href = '/'; 
                } else {
                    alert("Invalid username or password!");
                }
            })
            .catch(err => console.error("Error during login:", err));
        });
    </script>
</body>
</html>
