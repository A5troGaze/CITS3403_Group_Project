<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>NGGYUNGLYD</title>
        <!-- bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/secret.css')}}">
        <script src="https://code.jquery.com/jquery-1.10.2.js"></script>

    </head>

    <body class="d-flex flex-column min-vh-100">

        {% include 'components/navbar.html' %}

        <main class="flex-grow-1 d-flex justify-content-center align-items-center">

            <div class="container text-center px-3 px-md-4">

                <h2 class="mt-4 mb-4">Our Beloved Leader:</h2>

                <!-- YT vid Embed-->
                <div class="ratio ratio-16x9 mx-auto" style="max-width: 1100px;">
                    <iframe 
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
                    title="Rick Astley - Never Gonna Give You Up (Video)" 
                    allow="autoplay; encrypted-media;"
                    allowfullscreen>
                    </iframe>
                </div>

                <!-- Rick Astley Quiz -->
                <div id="quiz" class="mt-4">
                    <div id="question-box" class="card shadow p-4 mx-auto w-100" style="max-width: 600px;">
                        <h4 id="question-text" class="mb-4"></h4>
                        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                            <button class="btn btn-dark btn-lg hover-btn" id="btn-yes">Yes</button>
                            <button class="btn btn-outline-dark btn-lg hover-btn" id="btn-no">No</button>
                        </div>
                        <p id="feedback" class="mt-3 text-danger fw-bold" style="min-height: 1.5rem;"></p>
                    </div>
                </div>

                <!-- Goodbye Message -->
                <div id="goodbye-msg" class="mt-4">
                    <div class="text-center text-white p-4">
                        <h2 style="font-size: 2.5rem;"> He's <span class="goodbye-style">NEVER</span> gonna say <span class="goodbye-style">GOODBYE</span>!</h2>
                    </div>
                </div>

            </div>

        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
        <script src="{{ url_for('static', filename='js/secret.js')}}"></script>
    </body>

</html>
