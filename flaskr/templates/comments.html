<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Comments</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/cits3403_projLogoBGXround.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  </head>

  <body>

    {% include 'components/navbar.html' %}


    <div class="container mt-5">
      <div class="row d-flex justify-content-center">
          <div class="col-md-10 col-lg-8">

            <div class="mb-5">
                <div class="card-body p-4">
                    <h2 class="mb-3">Welcome to the Comments Page!</h2>
                    <p class="text-muted mb-0">Share your thoughts, feedback, advice regarding our Annoying Website project and see other people's comments!</p>
                </div>
            </div>



              <div class="card shadow-sm border mb-5">
                  <div class="card-body p-4">
                      <h4 class="mb-3">Leave a Comment</h4>
                      <form id="commentForm">
                          <div class="form-floating mb-3">
                              <textarea class="form-control" id="commentText" placeholder="Leave a comment here" style="height: 100px" required></textarea>
                              <label for="commentText">Just like in life, you can't retract what you say...</label>
                          </div>
                          <button type="submit" class="btn btn-dark float-end hover-btn">Post Comment</button>
                      </form>
                  </div>
              </div>

              <div class="card shadow-sm border mb-5">
                
                <div class="card-header bg-white border-bottom-0 pt-4 pb-2">
                    <h4 class="mb-0">Recent Comments</h4>
                </div>

                <div class="card-body" style="max-height: 600px; overflow-y: auto;">
                    
                    <div id="liveCommentFeed">
                        </div>

                </div>
                
              </div> 
              </div> 
              </div> 
              </div>

    {% include 'components/footer.html' %}

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/comments.js') }}"></script>
  </body>
</html>
