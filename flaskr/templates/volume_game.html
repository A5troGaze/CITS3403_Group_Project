<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Volume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
    <link rel="stylesheet" href="../static/global.css">
</head>

<body>

    {% include 'components/navbar.html' %}

    <div id="volume-popup"
        style="position: fixed; display: flex; flex-direction: column; align-items: center; justify-content: center; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 99999; pointer-events: auto;">
        <div
            style="background-color: white; color: black; padding: 30px; border-radius: 10px; text-align: center; pointer-events: auto;">
            <h2>Volume check!!</h2>
            <p>Make sure to turn up your volume for this one!</p>
            <button type="button" id="start-button" class="btn btn-light hover-btn">Start Game</button>
        </div>
    </div>

    <div class="container-fluid"
        style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <div id="volume-slider">
            <svg id="volume-icon" class="volume-icon" viewBox="-1 0 33 32">
                <defs>
                    <mask id="circle-mask" x="-1" y="0" width="33" height="32">
                        <circle cx="-1" cy="16" r="33" fill="white" id="circle-mask-shape" />
                    </mask>

                    <mask id="volume-mask" x="-1" y="0" width="33" height="32">
                        <path
                            d="M22.485 25.985c-0.384 0-0.768-0.146-1.061-0.439-0.586-0.586-0.586-1.535 0-2.121 4.094-4.094 4.094-10.755 0-14.849-0.586-0.586-0.586-1.536 0-2.121s1.536-0.586 2.121 0c2.55 2.55 3.954 5.94 3.954 9.546s-1.404 6.996-3.954 9.546c-0.293 0.293-0.677 0.439-1.061 0.439v0zM17.157 23.157c-0.384 0-0.768-0.146-1.061-0.439-0.586-0.586-0.586-1.535 0-2.121 2.534-2.534 2.534-6.658 0-9.192-0.586-0.586-0.586-1.536 0-2.121s1.535-0.586 2.121 0c3.704 3.704 3.704 9.731 0 13.435-0.293 0.293-0.677 0.439-1.061 0.439zM13 30c-0.26 0-0.516-0.102-0.707-0.293l-7.707-7.707h-3.586c-0.552 0-1-0.448-1-1v-10c0-0.552 0.448-1 1-1h3.586l7.707-7.707c0.286-0.286 0.716-0.372 1.090-0.217s0.617 0.519 0.617 0.924v26c0 0.404-0.244 0.769-0.617 0.924-0.124 0.051-0.254 0.076-0.383 0.076z"
                            fill="white" mask="url(#circle-mask)"></path>
                    </mask>

                    <linearGradient id="grad-1" x1="0" x2="1" y1="0" y2="0">
                        <stop offset="20%" stop-color="#9a88aa" />
                        <stop offset="100%" stop-color="#6e33a5" />
                    </linearGradient>
                </defs>

                <path class="volume-icon-bg" fill="#cbc8ce"
                    d="M22.485 25.985c-0.384 0-0.768-0.146-1.061-0.439-0.586-0.586-0.586-1.535 0-2.121 4.094-4.094 4.094-10.755 0-14.849-0.586-0.586-0.586-1.536 0-2.121s1.536-0.586 2.121 0c2.55 2.55 3.954 5.94 3.954 9.546s-1.404 6.996-3.954 9.546c-0.293 0.293-0.677 0.439-1.061 0.439v0zM17.157 23.157c-0.384 0-0.768-0.146-1.061-0.439-0.586-0.586-0.586-1.535 0-2.121 2.534-2.534 2.534-6.658 0-9.192-0.586-0.586-0.586-1.536 0-2.121s1.535-0.586 2.121 0c3.704 3.704 3.704 9.731 0 13.435-0.293 0.293-0.677 0.439-1.061 0.439zM13 30c-0.26 0-0.516-0.102-0.707-0.293l-7.707-7.707h-3.586c-0.552 0-1-0.448-1-1v-10c0-0.552 0.448-1 1-1h3.586l7.707-7.707c0.286-0.286 0.716-0.372 1.090-0.217s0.617 0.519 0.617 0.924v26c0 0.404-0.244 0.769-0.617 0.924-0.124 0.051-0.254 0.076-0.383 0.076z">
                </path>

                <rect x="-1" y="0" width="33" height="32" fill="url(#grad-1)" mask="url(#volume-mask)" />
            </svg>

            <div class="volume-track">
                <span id="volume-indicator" class="volume-indicator"></span>
                <input type="hidden" name="volume" id="volume-input" />
            </div>

        </div>


        <audio id="background-sound" src="{{ url_for('static', filename='audio/mii-channel-music.mp3') }}"
            preload="auto" loop></audio>

        <audio id="background-sound-2" src="{{ url_for('static', filename='audio/iphone-alarm-radar.mp3') }}"
            loop></audio>

        <audio id="release-sound" src="{{ url_for('static', filename='audio/luigi-here-we-go.mp3') }}"></audio>

        <audio id="miss-sound" src="{{ url_for('static', filename='audio/death_E1a7HAQ.mp3') }}"></audio>

        <audio id="win-sound" src="{{ url_for('static', filename='audio/mario-kart-wii-first-place.mp3') }}"></audio>

        <audio id="hit-sound" src="{{ url_for('static', filename='audio/yahoo-luigi.mp3') }}"></audio>

        <div id="progress-message" class="mt-3"
            style="text-align: center; margin-top: 5px; font-family: 'Consolas', monospace;">
            Status: <span id="progress-count">0</span><span id="progress-suffix"> / 5</span>
        </div>
        <div id="win-message"
            style="display: none; text-align: center; margin-top: 10px; font-family: 'Consolas', monospace;">
            Congrats you passed the level!
        </div>
    </div>


    <script src="{{ url_for('static', filename='js/volume_game.js') }}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
