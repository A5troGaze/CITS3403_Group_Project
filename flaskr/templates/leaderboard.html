<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Leaderboard</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/cits3403_projLogoBGXround.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
  </head>

  <body>

    {% include 'components/navbar.html' %}

    <div class="container mt-5">
      <h2>Global Leaderboard</h2>

      <!-- Leadboard Search / Filter Input-->
      <input 
        type="text" 
        id="searchInput" 
        class="form-control mb-4" 
        placeholder="Start typing to search players..."
      >
      
      <!-- Leaderboard -->
      <table class="table table-striped mt-3">

        <!-- Header -->
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Time (Seconds)</th>
          </tr>
        </thead>

        <!-- Leaderboard Body -->
        <tbody id="leaderboardBody" class="table-group-divider">
          {% for user in users %}
          <tr class="{% if current_user.is_authenticated and user.id == current_user.id %}table-warning{% endif %}">
            <td>{{ user.real_rank }}</td> 
            <td>{{ user.username }}</td>                  
            <td>{{ user.total_time }}s</td>
          </tr>
          {% endfor %}
        </tbody>

      </table>

    </div>

    <br><br><br><br><br>
    {% include 'components/footer.html' %}

    <script>
    const searchInput = document.getElementById('searchInput');
    const tableBody = document.getElementById('leaderboardBody');

    function escapeHTML(str) {
        return String(str).replace(/[&<>'"]/g, tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag] || tag));
    }

    searchInput.addEventListener('input', function() {
      const query = this.value;
      fetch(`/api/search?q=${query}`)
        .then(response => response.json())
        .then(data => {
          tableBody.innerHTML = ''; 

          if (data.length === 0) {
              tableBody.innerHTML = '<tr><td colspan="4" class="text-center">Stop looking for people that don\'t exist.</td></tr>';
              return; 
          }
            let allRowsHTML = '';
            data.forEach(user => {
              const highlightClass = user.is_current_user ? 'table-warning' : '';
              const row = `
                <tr class="${highlightClass}">
                    <td>${escapeHTML(user.rank)}</td>
                    <td>${escapeHTML(user.username)}</td>
                    <td>${escapeHTML(user.total_time)}s</td>
                </tr>
            `;
            allRowsHTML += row;
            });
            tableBody.innerHTML = allRowsHTML;
        })
        .catch(error => console.error('Error fetching search results:', error));
    });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
