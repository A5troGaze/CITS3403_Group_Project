<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>

<body>

    {% include 'components/navbar.html' %}

    <div class="container-fluid min-vh-100 d-flex flex-column justify-content-center align-items-center">
        <h1 id="signInHeader" class="fw-bold" style="cursor: pointer;">Sign In</h1>
        <br>

        <form id="signInForm" style="max-width: 350px; width: 100%;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter username">
                <small id="usernameHint" class="form-text text-muted">Other people will be able to see your
                    username.</small>
            </div>
            <br>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password">
            </div>
            <br>

            <button type="submit" class="btn btn-dark w-100 hover-btn">Sign In</button>
            <p id="signupHint" class="mt-3">Don't have an account? <a href="#" onclick="return false;">Sign up</a></p>
        </form>

        <div id="alertPopup" class="position-fixed top-50 start-50 translate-middle bg-light border p-4 rounded"
            style="display: none; z-index: 1050;">
            <p id="popupMessage" class="mb-0"></p>
        </div>

        <script>
            // hint 1
            const hint1 = document.getElementById("usernameHint");

            hint1.addEventListener("mouseenter", function () {
                hint1.textContent = "HINT: Maybe it's not that complicated...";
            });
            hint1.addEventListener("mouseleave", function () {
                hint1.textContent = "Other people will be able to see your username.";
            });

            // hint 2
            const hint2 = document.getElementById("signupHint");

            hint2.addEventListener("mouseenter", function () {
                hint2.innerHTML = "HINT: Make sure you're looking at the right <strong>Sign In</strong>";
            });
            hint2.addEventListener("mouseleave", function () {
                hint2.innerHTML = "Don't have an account? <a href=\"#\" onclick=\"return false;\">Sign up</a>";
            });


            const form = document.getElementById("signInForm");

            form.addEventListener("submit", function (event) {
                event.preventDefault();
                alert("You really thought we'd make it that easy? Have a good look around and try again!");
            });

            // pass level
            function showAlert(message) {
                const popup = document.getElementById("alertPopup");
                const popupMessage = document.getElementById("popupMessage");

                popupMessage.textContent = message;
                popup.style.display = "block";
            }

            const header = document.getElementById("signInHeader");

            header.addEventListener("click", function () {
                showAlert("You passed the level!");
            });


        </script>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
