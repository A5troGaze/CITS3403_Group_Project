<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>The Maze</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
        <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
        <style>
        /* */
            #maze_card {
                display: flex;
                justify-content: center;
                align-items: center;
            }
        
        /* ── Mode select overlay ── */
            #mode-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.75);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 10000;
            }
 
            #mode-box {
                background: #fff;
                border-radius: 16px;
                padding: 40px 50px;
                text-align: center;
                max-width: 380px;
                width: 90%;
                box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            }
 
            #mode-box h2 {
                font-size: 1.8rem;
                font-weight: 800;
                margin-bottom: 8px;
            }
 
            #mode-box p {
                color: #666;
                margin-bottom: 28px;
                font-size: 0.95rem;
            }
 
            .mode-btn {
                display: block;
                width: 100%;
                padding: 14px;
                border: none;
                border-radius: 10px;
                font-size: 1.05rem;
                font-weight: 700;
                cursor: pointer;
                transition: transform 0.1s, box-shadow 0.1s;
                margin-bottom: 12px;
            }

            .mode-btn:active { 
                transform: translateY(0); 
            }
 
        /* ── Taunt popup (easy mode) ── */
            #taunt-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.6);
                display: none;
                align-items: center;
                justify-content: center;
                z-index: 10001;
            }
 
            #taunt-box {
                background: #fff;
                border-radius: 16px;
                padding: 36px 44px;
                text-align: center;
                max-width: 340px;
                width: 90%;
                box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            }
 
            #taunt-box h3 {
                font-size: 1.5rem;
                font-weight: 800;
                margin-bottom: 10px;
                color: #dc3545;
            }
 
            #taunt-box p {
                color: #444;
                margin-bottom: 24px;
            }
 
            #taunt-ok {
                color: #fff;
                border: none;
                border-radius: 10px;
                padding: 12px 32px;
                font-size: 1rem;
                font-weight: 700;
                cursor: pointer;
                transition: background 0.2s;
            }

        /* -- Mobile button style */
            .mobile-btn {
                width:60px;
                height: 60px;
                font-size: 1.2rem;
            }

        </style>
    
    </head>

    <body class="bg-light text-center d-flex flex-column min-vh-100">

        {% include 'components/navbar.html' %}

        <!--"mode" selection-->
        <div id="mode-overlay">
            <div id="mode-box">
                <h2>Dude! That's A-Maze-ing!</h2>
                <p>Choose your difficulty level.<br>Choose wisely...</p>
                <button class="mode-btn hover-btn btn btn-dark" id="btn-easy">Easy</button>
                <button class="mode-btn hover-btn btn btn-dark" id="btn-hard">Hard</button>
            </div>
        </div>

        <!--taunt popup (taunt the user when they pick easy mode)-->
        <div id="taunt-overlay" style="display: none; flex-direction: column;">
            <div id="taunt-box">
                <h3>Easy Mode? Really?</h3>
                <p>There is no easy mode.<br><strong> Get good 😎</strong></p>
                <button id="taunt-ok" class="hover-btn btn btn-dark">Yes Master</button>
            </div>
        </div>

        <div class="container mt-2 d-flex flex-column align-items-center">
            <h2>Complete the Maze!</h2>

            <div id="maze_card" class="card shadow p-3 bg-white rounded mt-2">

                <canvas id="maze_canvas" class="border border-dark rounded"></canvas>

            </div>

            <div id="mobile-controls" class="d-none">
                <div class="d-flex flex-column align-items-center gap-2 my-3">
                    <button class="btn btn-dark mobile-btn" id="mob-up">▲</button>
                    <div class="d-flex gap-2">
                        <button class="btn btn-dark mobile-btn" id="mob-left">◀</button>
                        <div style="width: 60px; height: 60px;"></div>
                        <button class="btn btn-dark mobile-btn" id="mob-right">▶</button>
                    </div>
                    <button class="btn btn-dark mobile-btn" id="mob-down">▼</button>

                </div>
            </div>

        </div>

        <script src="../static/js/maze.js"></script>

    </body>

</html>
