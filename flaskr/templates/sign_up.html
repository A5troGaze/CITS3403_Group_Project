<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <script src="https://code.jquery.com/jquery-1.10.2.js"></script>
</head>
<body>
    {% include 'components/navbar.html' %}

    <div class="container-fluid min-vh-100 d-flex flex-column justify-content-center align-items-center">
        <h1 class="fw-bold">Create an Account</h1>
        <br>

        <form id="signUpForm" style="width: 300px;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-control" name="name" placeholder="Janelle Lee" required>
            </div>
            <br>
            <div class="form-group">
                <label>Username</label>
                <input type="text" class="form-control" name="username" placeholder="Pick a username" required>
            </div>
            <br>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-control" name="password" placeholder="Make it strong" required>
            </div>
            <br>
            <button type="submit" class="btn btn-dark w-100">Sign Up</button>
        </form>
        <p class="mt-3">Already have an account? <a href="{{ url_for('signin_page') }}">Sign In</a></p>
    </div>

    {% include 'components/footer.html' %}

    <script>
        const signUpForm = document.querySelector('#signUpForm');

        signUpForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const formData = {
                name: e.target.name.value,
                username: e.target.username.value,
                password: e.target.password.value
            };

            fetch('/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(res => {
                if (res.ok) {
                    alert("Account created successfully!");
                    window.location.href = '/'; // Logged in and sent home
                } else {
                    res.json().then(data => alert("Signup failed: " + data.errors));
                }
            });
        });
    </script>
</body>
</html>
